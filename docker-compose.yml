services:
  backend:
    build: ./backend
    image: username/flask-api:latest
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_USER: kawtar
      DB_PASSWORD: kawtar
      DB_NAME: flaskdb
    depends_on:
      - db

  frontend:
    build: ./frontend
    image: username/frontend-app:latest
    ports:
      - "3000:80"
    depends_on:
      - backend

  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: kawtar
      MYSQL_DATABASE: flaskdb
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3307:3306"
